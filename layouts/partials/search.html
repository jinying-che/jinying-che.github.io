<script>
  // Move results container inside the search wrapper
  (function() {
    const wrapper = document.getElementById("search-wrapper");
    if (wrapper) {
      const results = document.createElement("div");
      results.id = "search-results";
      wrapper.appendChild(results);
    }
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
  (function () {
    const input = document.getElementById("search-input");
    const resultsContainer = document.getElementById("search-results");
    const kbd = document.getElementById("search-kbd");
    let fuse;
    let loaded = false;

    function loadIndex() {
      if (loaded) return;
      loaded = true;
      fetch("/tech/index.json")
        .then((res) => res.json())
        .then((data) => {
          fuse = new Fuse(data, {
            keys: [
              { name: "title", weight: 0.5 },
              { name: "tags", weight: 0.3 },
              { name: "content", weight: 0.2 },
            ],
            includeMatches: true,
            minMatchCharLength: 2,
            threshold: 0.5,
          });
        });
    }

    function showResults() {
      const query = input.value.trim();
      if (!fuse || query.length < 2) {
        resultsContainer.style.display = "none";
        resultsContainer.innerHTML = "";
        return;
      }

      const results = fuse.search(query);
      if (results.length === 0) {
        resultsContainer.innerHTML = '<p class="search-no-results">No results found.</p>';
        resultsContainer.style.display = "block";
        return;
      }

      resultsContainer.innerHTML = results
        .slice(0, 15)
        .map((r) => {
          const item = r.item;
          const tags = item.tags
            ? item.tags.map((t) => `<span class="search-tag">${t}</span>`).join(" ")
            : "";
          return `
            <div class="search-result">
              <a href="${item.permalink}">
                <span class="search-result-title">${item.title}</span>
              </a>
              <span class="search-date">${item.date}</span>
              ${tags ? `<span class="search-tags">${tags}</span>` : ""}
            </div>`;
        })
        .join("");
      resultsContainer.style.display = "block";
    }

    function closeResults() {
      resultsContainer.style.display = "none";
      resultsContainer.innerHTML = "";
    }

    input.addEventListener("focus", function () {
      loadIndex();
      if (kbd) kbd.style.display = "none";
      showResults();
    });

    input.addEventListener("blur", function () {
      if (kbd && !input.value) kbd.style.display = "inline-block";
      // Delay to allow click on results
      setTimeout(closeResults, 200);
    });

    input.addEventListener("input", showResults);

    // "/" shortcut to focus search
    document.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        input.focus();
      }
      if (e.key === "/") {
        const tag = document.activeElement.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        e.preventDefault();
        input.focus();
      }
      if (e.key === "Escape") {
        input.blur();
      }
    });
  })();
</script>

<style>
  .navigation-menu {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  #search-bar:focus-within {
    opacity: 1;
  }

  #search-bar svg {
    flex-shrink: 0;
    opacity: 0.5;
  }

  #search-input {
    background: transparent;
    color: var(--color);
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 0.9rem;
    width: 140px;
    padding: 2px 0;
  }

  #search-input::placeholder {
    color: var(--color);
    opacity: 0.5;
  }

  #search-kbd {
    flex-shrink: 0;
    display: inline-block;
    padding: 0 6px;
    font-size: 0.8rem;
    font-family: inherit;
    color: var(--color);
    opacity: 0.4;
    border: 1px solid var(--color);
    border-radius: 3px;
    line-height: 1.4;
  }

  #search-wrapper {
    position: relative;
  }

  #search-results {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    width: 400px;
    max-height: 60vh;
    overflow-y: auto;
    background: var(--background);
    border: 1px solid var(--accent);

    padding: 8px 12px;

  }

  .search-result {
    padding: 8px 0;

  }

  .search-result:last-child {

  }

  .search-result a {

  }

  .search-result-title {
    color: var(--accent);
    font-weight: bold;
  }

  .search-date {
    font-size: 0.8rem;

  }

  .search-tag {

  }

  .search-no-results {

  }
</style>
